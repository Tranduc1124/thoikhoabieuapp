workflows:
  ios-release:
    name: iOS Release - Thoi Khoa Bieu
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase
      vars:
        BUNDLE_ID: "com.minhduc.thoikhoabieuapp"
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Prepare Firebase iOS config
        script: |
          # Option 1: Commit ios/Runner/GoogleService-Info.plist to the private repo.
          # Option 2: Add GOOGLE_SERVICE_INFO_PLIST_BASE64 in Codemagic > Environment variables.
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
          fi
      - name: CocoaPods install
        script: |
          cd ios
          pod install
      - name: Build iOS release
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
      - build/ios/archive/*.xcarchive
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - your-email@example.com

# Firebase setup:
# 1. Run: dart pub global activate flutterfire_cli
# 2. Run: flutterfire configure --platforms=ios
# 3. Put GoogleService-Info.plist in ios/Runner, or provide
#    GOOGLE_SERVICE_INFO_PLIST_BASE64 in Codemagic environment variables.
#
# Apple Developer signing:
# - In Codemagic, add App Store Connect API key or upload certificate/provisioning profile.
# - Replace BUNDLE_ID with your real bundle id.
# - For App Store/TestFlight export, change the build command to create an ipa after
#   signing is configured: flutter build ipa --release --export-options-plist=...
