workflows:
  ios-release:
    name: iOS Release - Thoi Khoa Bieu
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase
      vars:
        BUNDLE_ID: "com.minhduc.thoikhoabieuapp"

    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - name: Create iOS platform if missing
        script: |
          flutter create --platforms=ios --org com.minhduc .

      - name: Set iOS deployment target
        script: |
          if [ -f ios/Podfile ]; then
            sed -i '' "s/# platform :ios.*/platform :ios, '15.0'/" ios/Podfile
            grep -q "platform :ios" ios/Podfile || sed -i '' "1s/^/platform :ios, '15.0'\n/" ios/Podfile
          fi
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Thời Khoá Biểu" ios/Runner/Info.plist || true
          perl -0pi -e 's/PRODUCT_BUNDLE_IDENTIFIER = \x7bBUNDLE_ID\x7d;/PRODUCT_BUNDLE_IDENTIFIER = com.minhduc.thoikhoabieuapp;/g; s/com\.example\.thoikhoabieuapp/com.minhduc.thoikhoabieuapp/g' ios/Runner.xcodeproj/project.pbxproj
          perl -0pi -e "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Flutter pub get
        script: |
          flutter clean
          flutter pub get

      - name: Prepare Firebase iOS config
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
          fi
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            echo "Missing ios/Runner/GoogleService-Info.plist. Commit it to the private repo or set GOOGLE_SERVICE_INFO_PLIST_BASE64 in Codemagic."
            exit 1
          fi

      - name: Debug iOS bundle identifiers
        script: |
          echo "PRODUCT_BUNDLE_IDENTIFIER lines:"
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj
          if grep -R "$(printf '\173BUNDLE_ID\175')" ios; then
            echo "Invalid BUNDLE_ID placeholder found in ios project files."
            exit 1
          fi

      - name: CocoaPods install
        script: |
          cd ios
          pod repo update
          pod install

      - name: Build iOS release
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - dt2581433@gmail.com
