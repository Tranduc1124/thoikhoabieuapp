workflows:
  ios-release:
    name: iOS Release - Thoi Khoa Bieu
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase
      vars:
        BUNDLE_ID: "com.minhduc.thoikhoabieuapp"

    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - name: Create iOS platform if missing
        script: |
          flutter create --platforms=ios .

      - name: Set iOS deployment target
        script: |
          if [ -f ios/Podfile ]; then
            sed -i '' "s/# platform :ios.*/platform :ios, '15.0'/" ios/Podfile
            grep -q "platform :ios" ios/Podfile || sed -i '' "1s/^/platform :ios, '15.0'\n/" ios/Podfile
          fi

      - name: Flutter pub get
        script: |
          flutter clean
          flutter pub get

      - name: Prepare Firebase iOS config
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
          fi

      - name: CocoaPods install
        script: |
          cd ios
          pod repo update
          pod install

      - name: Build iOS release
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - dt2581433@gmail.com