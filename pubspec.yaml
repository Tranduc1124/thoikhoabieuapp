name: thoikhoabieuapp
description: "Thoi Khoa Bieu - iOS schedule app built with Flutter, PHP API, and Riverpod."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  animations: ^2.0.11
  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.1
  flutter_local_notifications: ^19.5.0
  flutter_secure_storage: ^10.2.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.0.0
  http: ^1.5.0
  intl: ^0.20.2
  lottie: ^3.3.2
  timezone: ^0.10.1
  home_widget: ^0.9.1
  share_plus: ^13.1.0
  qr_flutter: ^4.1.0
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  uuid: ^4.5.3
  image_picker: ^1.2.2
  shared_preferences: ^2.5.5
  package_info_plus: ^10.1.0
  app_links: ^6.4.0
  nfc_manager: ^4.0.2
  url_launcher: ^6.3.1
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
