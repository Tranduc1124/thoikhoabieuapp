name: thoikhoabieuapp
description: "Thoi Khoa Bieu - iOS schedule app built with Flutter, Firebase, and Riverpod."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  animations: ^2.0.11
  cloud_firestore: ^6.1.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  fl_chart: ^1.1.1
  flutter_local_notifications: ^19.5.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.0.0
  google_sign_in: ^6.3.0
  intl: ^0.20.2
  lottie: ^3.3.2
  sign_in_with_apple: ^7.0.1
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
